<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="512" cy="512" r="480" fill="url(#bgGrad)"/>

  <!-- 罐子主体 -->
  <path d="M300 280 L300 700 Q300 760 360 760 L660 760 Q720 760 720 700 L720 280 Q720 240 680 240 L340 240 Q300 240 300 280 Z" fill="#f8fafc"/>

  <!-- 罐子顶部卡扣 -->
  <rect x="380" y="180" width="260" height="80" rx="16" fill="#e2e8f0"/>
  <rect x="400" y="200" width="220" height="40" rx="8" fill="url(#bgGrad)"/>

  <!-- 罐子内的渐变色块（代表剪贴内容） -->
  <rect x="340" y="400" width="340" height="280" rx="24" fill="url(#bgGrad)" opacity="0.9"/>

  <!-- 剪贴内容线条 -->
  <rect x="370" y="440" width="280" height="24" rx="12" fill="white" opacity="0.6"/>
  <rect x="370" y="490" width="200" height="24" rx="12" fill="white" opacity="0.4"/>
  <rect x="370" y="540" width="240" height="24" rx="12" fill="white" opacity="0.3"/>

  <!-- 罐子高光 -->
  <path d="M320 300 Q320 300 340 300 L335 680 Q320 680 320 660 Z" fill="white" opacity="0.25"/>
</svg>